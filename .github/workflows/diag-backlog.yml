name: diag-backlog

# 受注残の実データ構造を確認するための一時的な診断ジョブ(手動実行のみ)。
# ログを見て受注残の入り方(数値ファクト/テキストブロック)を確定したら、この
# ワークフローは削除してよい。何も書き込まない読み取り専用。
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run order-backlog diagnostic (read-only)
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python diag_backlog.py
