name: update-data
on:
  schedule:
    - cron: "0 22 * * 1-5"
    - cron: "0 23 * * 1-5"
    - cron: "10 7 * * 1-5"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild data.json
        run: python update_data.py
      - name: Commit if changed
        run: |
          git config user.name "data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "data: auto update"
          git push
