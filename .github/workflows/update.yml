name: update-data
on:
  schedule:
    # ↓UTC基準。JST = UTC+9。朝6:00〜8:30(JST)は前日UTCの21:00〜23:30、
    # 月曜朝も拾うためUTC側の曜日は「0-4(日〜木)」で指定している。
    - cron: "0 21 * * 0-4"   # JST 平日 06:00
    - cron: "0 22 * * 0-4"   # JST 平日 07:00
    - cron: "30 22 * * 0-4"  # JST 平日 07:30
    - cron: "0 23 * * 0-4"   # JST 平日 08:00(寄り付き前ラストチャンス)
    - cron: "30 23 * * 0-4"  # JST 平日 08:30
    - cron: "0 3 * * 1-5"    # JST 平日 12:00(前引け後)
    - cron: "30 6 * * 1-5"   # JST 平日 15:30(大引け後)
    - cron: "0 9 * * 1-5"    # JST 平日 18:00
    - cron: "0 10 * * 1-5"   # JST 平日 19:00
    - cron: "0 11 * * 1-5"   # JST 平日 20:00
    - cron: "0 12 * * 1-5"   # JST 平日 21:00(米国プレマーケット)
    - cron: "0 14 * * 1-5"   # JST 平日 23:00(米国寄り付き後)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild data.json
        run: python update_data.py
      - name: Commit if changed
        run: |
          git config user.name "data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "data: auto update"
          git push
