name: update-customers

# 主要顧客データ(有報ベース)の更新。
# 有報は年1回しか出ないため、年数回の実行で十分。
# 毎月1日 07:00 JST(= 前日22:00 UTC)に実行。手動実行も可。
on:
  schedule:
    - cron: "0 22 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  customers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch major customers from IRBANK
        run: python fetch_customers.py

      - name: Commit customers
        run: |
          git config user.name  "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add docs/customers.json
          git diff --staged --quiet || git commit -m "customers: update"
          git pull --rebase --autostash || true
          git push
